# Example pipeline configuration consumed by `python -m src.cli.main --config <file>`.
sources:
  - path: data/sales_q1.xlsx
    column_mapping:
      Kundennummer: customer_id
      Umsatz_EUR: revenue
    schema:
      allow_extra_cols: true
      columns:
        - name: customer_id
          dtype: int
          nullable: false
        - name: revenue
          dtype: float
          nullable: false
          min_value: 0

  - path: data/sales_q2.xlsx
    schema:
      allow_extra_cols: true
      columns:
        - name: customer_id
          dtype: int
          nullable: false
        - name: revenue
          dtype: float
          nullable: false
          min_value: 0

merge:
  join_key: customer_id
  conflict_resolution: last_wins

cleaning:
  duplicate_strategy: drop_last
  duplicate_subset:
    - customer_id

outliers:
  enabled: true
  method: isolation_forest
  contamination: 0.05
  columns:
    - revenue

output:
  path: output/merged_clean.xlsx
